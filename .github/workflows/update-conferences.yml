name: Update conference data

on:
  schedule:
    - cron: "15 21 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: update-conference-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -t . -v
      - name: Refresh conference JSON
        id: refresh
        run: python3 scripts/update_conferences.py
      - name: Validate refreshed conference JSON
        run: python3 scripts/update_conferences.py --validate-only
      - name: Load conference rating issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue list --state all --limit 1000 --json number,title,body,url,author,createdAt > /tmp/conference-ratings.json
      - name: Load external rating submissions
        env:
          RATING_API_URL: ${{ secrets.RATING_API_URL }}
          RATING_READ_TOKEN: ${{ secrets.RATING_READ_TOKEN }}
        run: |
          if test -n "$RATING_API_URL" && test -n "$RATING_READ_TOKEN"; then
            curl --fail --silent --show-error --get "$RATING_API_URL" --data-urlencode "token=$RATING_READ_TOKEN" > /tmp/external-ratings.json
          else
            echo "[]" > /tmp/external-ratings.json
          fi
      - name: Aggregate attendee ratings
        run: >-
          python3 scripts/aggregate_ratings.py
          --issues /tmp/conference-ratings.json
          --external-ratings /tmp/external-ratings.json
          --conferences data/conferences.json
          --output data/ratings.json
      - name: Load open conference reports
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue list --state open --limit 25 --json number,title,body,url,createdAt > /tmp/open-conference-reports.json
      - name: Load external conference reports
        env:
          REPORT_API_URL: ${{ secrets.REPORT_API_URL }}
          REPORT_READ_TOKEN: ${{ secrets.REPORT_READ_TOKEN }}
        run: |
          if test -n "$REPORT_API_URL" && test -n "$REPORT_READ_TOKEN"; then
            curl --fail --silent --show-error --get "$REPORT_API_URL" --data-urlencode "token=$REPORT_READ_TOKEN" > /tmp/external-conference-reports.json
          else
            echo "[]" > /tmp/external-conference-reports.json
          fi
      - name: Retry unresolved conference reports
        id: feedback
        run: >-
          python3 scripts/process_pending_feedback.py
          --issues /tmp/open-conference-reports.json
          --external-reports /tmp/external-conference-reports.json
          --summary-dir /tmp/feedback-summaries
          --results /tmp/feedback-results.json
      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: "Update conference data"
          file_pattern: data/conferences.json data/history.json data/candidates.json data/sources.json data/ratings.json data/reports
      - name: Close reports resolved by the daily update
        if: steps.feedback.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          jq -c '.results[] | select(.applied == true and .source == "github")' /tmp/feedback-results.json | while IFS= read -r item; do
            issue_number=$(jq -r '.issue_number' <<< "$item")
            summary_path=$(jq -r '.summary_path' <<< "$item")
            gh issue comment "$issue_number" --body-file "$summary_path"
            gh pr list --state open --head "feedback/issue-$issue_number" --json number --jq '.[].number' | while IFS= read -r pr_number; do
              test -z "$pr_number" || gh pr close "$pr_number" --comment "每日更新已驗證並套用此修正，這個審查 PR 已不再需要。" --delete-branch
            done
            gh issue close "$issue_number" --reason completed
          done
      - name: Email daily feedback corrections
        if: steps.feedback.outcome == 'success'
        env:
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          REPORT_EMAIL: ftsainfu@gmail.com
        run: |
          jq -c '.results[] | select(.applied == true)' /tmp/feedback-results.json | while IFS= read -r item; do
            report_label=$(jq -r '.report_label // .issue_number // "external"' <<< "$item")
            summary_path=$(jq -r '.summary_path' <<< "$item")
            REPORT_SUMMARY="$summary_path" REPORT_SUBJECT="twconferences 每日更新已修正回報 $report_label" python3 scripts/send_report_email.py
          done
