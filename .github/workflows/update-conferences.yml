name: Update conference data

on:
  schedule:
    - cron: "15 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refresh conference JSON
        run: python3 scripts/update_conferences.py
      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update conference data"
          file_pattern: data/conferences.json data/history.json
